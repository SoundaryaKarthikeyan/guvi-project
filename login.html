<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 400px;">
        
        <h3 class="text-center mb-4">Welcome Back</h3>

        <input id="email" class="form-control mb-3" placeholder="Enter your email">
        
        <input id="password" type="password" class="form-control mb-3" placeholder="Enter your password">

        <button id="btn" class="btn btn-success w-100">Login</button>

        <p class="text-center mt-3">
            Don't have an account? <a href="register.html">Register</a>
        </p>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/login.js"></script>

</body>
</html>
