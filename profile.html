<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    
    <div class="card p-4 shadow mx-auto" style="max-width: 500px;">
        
        <h3 class="text-center mb-4">Your Profile</h3>

        <!-- NAME -->
        <label class="form-label">Full Name</label>
        <input id="name" class="form-control mb-3" placeholder="Enter your full name" disabled>

       <!-- PHOTO -->
<label class="form-label">Profile Photo</label>

<img id="preview"
     src="assets\Profile_avatar_placeholder_large.png"
     class="img-thumbnail mb-3"
     style="max-height:150px; max-width:150px;    align-self: center;   cursor:pointer;">

<input id="photo" type="file" class="form-control mb-3 d-none" accept="image/*">
        <!-- AGE -->
        <label class="form-label">Age</label>
        <select id="age" class="form-control mb-3" disabled>
            <option value="">Select your age</option>
        </select>

        <!-- DOB -->
        <label class="form-label">Date of Birth</label>
        <input id="dob" type="date" class="form-control mb-3" disabled>

        <!-- PHONE -->
        <label class="form-label">Phone Number</label>
        <input id="contact" class="form-control mb-3" placeholder="Enter 10-digit phone number" disabled>

        <!-- BUTTONS -->
        <button id="editBtn" class="btn btn-warning w-100 mb-2">Edit</button>
        <button id="saveBtn" class="btn btn-primary w-100 mb-2" style="display:none;">Save</button>
        <button id="logout" class="btn btn-danger w-100">Logout</button>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/profile.js"></script>

</body>
</html>
