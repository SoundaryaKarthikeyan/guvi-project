<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 400px;">
        
        <h3 class="text-center mb-4">Create Account</h3>

        <input id="email" class="form-control mb-3" placeholder="Enter your email address">
        
        <input id="password" type="password" class="form-control mb-3" placeholder="Create a secure password">

        <button id="btn" class="btn btn-primary w-100">Register</button>

        <p class="text-center mt-3">
            Already have an account? <a href="login.html">Login</a>
        </p>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/register.js"></script>

</body>
</html>
